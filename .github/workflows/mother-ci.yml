name: Mother System CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  mother-guardrails:
    name: Mother Architecture Guardrails
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        run: cd server && npm ci
      
      - name: Run Mother Guardrails
        run: cd server && npm run mother:check
        # This step FAILS the build if any direct legacy writes are detected
        # Exit code 1 = violations found = build blocked
      
      - name: Run Mother Audit (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd server && npm run mother:audit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: mother-guardrails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: cd server && npm ci
      
      - name: Run tests
        run: cd server && npm test
